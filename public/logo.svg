<svg viewBox="0 0 200 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Violet-to-indigo gradient for dark variant -->
    <linearGradient id="vv-grad-dark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <!-- White gradient for light variant -->
    <linearGradient id="vv-grad-light" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
  </defs>

  <!-- Dark variant: icon in violet gradient, text dark -->
  <g id="dark">
    <!-- Icon: 4 bars scaled to ~28px tall, centered in 40px height -->
    <g transform="translate(0, 4) scale(0.875)">
      <rect x="2" y="10" width="5" height="12" rx="2.5" fill="url(#vv-grad-dark)"/>
      <rect x="9" y="5" width="5" height="22" rx="2.5" fill="url(#vv-grad-dark)"/>
      <rect x="16" y="7" width="5" height="18" rx="2.5" fill="url(#vv-grad-dark)"/>
      <rect x="23" y="11" width="5" height="10" rx="2.5" fill="url(#vv-grad-dark)"/>
    </g>
    <!-- Wordmark: "Vaux" bold dark, "Voice" violet -->
    <text x="38" y="27" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="19" font-weight="700" fill="#111827" letter-spacing="-0.3">Vaux</text>
    <text x="98" y="27" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="19" font-weight="400" fill="#7c3aed" letter-spacing="-0.3">Voice</text>
  </g>

  <!-- Light variant: icon white/lavender, text white -->
  <g id="light" display="none">
    <!-- Icon: 4 bars scaled to ~28px tall, centered in 40px height -->
    <g transform="translate(0, 4) scale(0.875)">
      <rect x="2" y="10" width="5" height="12" rx="2.5" fill="url(#vv-grad-light)"/>
      <rect x="9" y="5" width="5" height="22" rx="2.5" fill="url(#vv-grad-light)"/>
      <rect x="16" y="7" width="5" height="18" rx="2.5" fill="url(#vv-grad-light)"/>
      <rect x="23" y="11" width="5" height="10" rx="2.5" fill="url(#vv-grad-light)"/>
    </g>
    <!-- Wordmark: all white -->
    <text x="38" y="27" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="19" font-weight="700" fill="#ffffff" letter-spacing="-0.3">Vaux</text>
    <text x="98" y="27" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="19" font-weight="400" fill="#c4b5fd" letter-spacing="-0.3">Voice</text>
  </g>
</svg>
